<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>문의 | 집현전21</title>

<link rel="stylesheet" href="assets/style.css">

<meta name="description" content="집현전21 문의 페이지">

</head>

<body>

<header id="header-include"></header>

<section class="hero">

<div class="container">

<h1>문의</h1>

<p>
집현전21 연구 협력, 세미나, 자료 제공 등에 관한 문의를 환영합니다.
</p>

</div>

</section>

<section>

<div class="container">

<h2 class="section-title">연락처</h2>

<div class="grid">

<div class="card">

<h3>이메일</h3>

<p>
wmcprpr@gmail.com
</p>

</div>

<div class="card">

<h3>연구 협력</h3>

<p>
연구 협력 및 프로젝트 제안은 이메일로 문의해 주시기 바랍니다.
</p>

</div>

<div class="card">

<h3>기관 문의</h3>

<p>
집현전21 활동 및 연구 관련 문의를 받습니다.
</p>

</div>

</div>

</div>

</section>

<footer id="footer-include"></footer>

<script>

async function loadInclude(){

try{

const headerRes=await fetch('assets/header.html')

if(headerRes.ok){

document.getElementById('header-include').innerHTML=await headerRes.text()

const current=(location.pathname.split('/').pop()||'index.html').toLowerCase()

document.querySelectorAll('.nav a').forEach(a=>{

if((a.getAttribute('href')||'').toLowerCase()===current) a.classList.add('active')

})

}

const footerRes=await fetch('assets/footer.html')

if(footerRes.ok){

document.getElementById('footer-include').innerHTML=await footerRes.text()

const y=document.getElementById('year')

if(y) y.textContent=new Date().getFullYear()

}

}catch(e){

console.error(e)

}

}

window.addEventListener('DOMContentLoaded',loadInclude)

</script>

</body>
</html>
