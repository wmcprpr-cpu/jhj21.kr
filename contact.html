<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>문의 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header id="header-include"></header>
  <main class="container" style="padding: 80px 0;">
    <h2 class="section-title">협력 및 문의</h2>
    <form onsubmit="return sendMail();">
      <input type="text" id="name" placeholder="성함 / 기관명" required style="width:100%; padding:15px; margin-bottom:20px;">
      <textarea id="message" placeholder="문의 내용" style="width:100%; height:200px; padding:15px;"></textarea>
      <button type="submit" class="btn btn-gold" style="width:100%;">문의 메일 보내기</button>
    </form>
  </main>
  <footer id="footer-include"></footer>
  <script>
    function sendMail(){
      const name = document.getElementById('name').value;
      const to = "wmcprpr@gmail.com";
      window.location.href = `mailto:${to}?subject=[집현전21 문의] ${name}`;
      return false;
    }
    async function loadInclude() {
      const h = await fetch('assets/header.html'); document.getElementById('header-include').innerHTML = await h.text();
      const f = await fetch('assets/footer.html'); document.getElementById('footer-include').innerHTML = await f.text();
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
