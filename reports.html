<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>연구보고서 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .report-item { display: grid; grid-template-columns: 120px 1fr 150px; padding: 30px 10px; border-bottom: 1px solid var(--line); align-items: center; }
    .pdf-btn { color: var(--navy); font-weight: 700; border-bottom: 2px solid var(--gold); }
  </style>
</head>
<body>
  <header id="header-include"></header>

  <section class="page-hero" style="background: var(--navy); color: white; padding: 60px 0; text-align: center;">
    <h1 style="color: var(--gold);">연구자료 아카이브</h1>
    <p>데이터와 철저한 근거를 바탕으로 기록된 지식입니다.</p>
  </section>

  <main class="container" style="padding: 60px 0;">
    <div class="report-item">
      <div style="color: var(--gold-dark); font-weight: 700;">2026-R01</div>
      <div>
        <h3 style="margin: 0; color: var(--navy);">[정책연구] 21세기 사회통합을 위한 심리상담 모델 연구</h3>
        <p style="margin: 5px 0 0;">연구진: 이승언 외 | 발행일: 2026.03.01</p>
      </div>
      <div style="text-align: right;"><a href="#" class="pdf-btn"><i class="fa-solid fa-file-pdf"></i> PDF 보기</a></div>
    </div>
  </main>

  <footer id="footer-include"></footer>

  <script>
    async function loadInclude() {
      try {
        const h = await fetch('assets/header.html');
        document.getElementById('header-include').innerHTML = await h.text();
        const f = await fetch('assets/footer.html');
        document.getElementById('footer-include').innerHTML = await f.text();
        document.getElementById("year").textContent = new Date().getFullYear();
        const cp = window.location.pathname.split("/").pop() || "index.html";
        document.querySelectorAll('.nav a').forEach(l => { if (l.getAttribute('href') === cp) l.classList.add('active'); });
      } catch (e) { console.error(e); }
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
