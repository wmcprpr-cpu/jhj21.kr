<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>연구위원 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header id="header-include"></header>
  <main class="container" style="padding: 60px 0;">
    <h2 class="section-title">주요 연구위원</h2>
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px;">
      <div class="card" style="border-left: 5px solid var(--navy);">
        <h3 style="font-size: 26px;">이승언</h3>
        <p style="color: var(--gold); font-weight: 700;">사회복지학 박사 / 회장</p>
        <p>집현전21의 비전 수립 및 총괄 운영을 담당하며 공동체 회복을 위한 실천을 주도합니다.</p>
      </div>
    </div>
  </main>
  <footer id="footer-include"></footer>
  <script>
    async function loadInclude() {
      const h = await fetch('assets/header.html'); document.getElementById('header-include').innerHTML = await h.text();
      const f = await fetch('assets/footer.html'); document.getElementById('footer-include').innerHTML = await f.text();
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
