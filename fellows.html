<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>연구위원 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .fellow-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-top: 40px; }
    .fellow-card { background: #fff; border-left: 5px solid var(--navy); padding: 40px; transition: 0.3s; }
    .fellow-card:hover { border-left-color: var(--gold); box-shadow: var(--shadow); }
    .field-tag { font-size: 14px; background: var(--gold-pale); color: var(--navy); padding: 4px 12px; font-weight: 600; margin-right: 5px; }
  </style>
</head>
<body>
  <header id="header-include"></header>

  <section class="page-hero" style="background: var(--navy); color: white; padding: 80px 0; text-align: center;">
    <h1 style="color: var(--gold);">연구진 소개</h1>
    <p>시대의 난제를 풀기 위해 모인 각 분야의 최고 전문가들입니다.</p>
  </section>

  <main class="container" style="padding: 60px 0;">
    <div class="fellow-grid">
      <div class="fellow-card">
        <div style="font-size: 26px; font-weight: 700; color: var(--navy);">이승언</div>
        <div style="color: var(--gold); font-weight: 600;">사회복지학 박사 / 회장</div>
        <p>집현전21의 비전 수립 및 총괄 운영을 담당합니다.</p>
        <span class="field-tag">#사회복지</span><span class="field-tag">#공동체회복</span>
      </div>
    </div>
  </main>

  <footer id="footer-include"></footer>

  <script>
    async function loadInclude() {
      try {
        const h = await fetch('assets/header.html');
        document.getElementById('header-include').innerHTML = await h.text();
        const f = await fetch('assets/footer.html');
        document.getElementById('footer-include').innerHTML = await f.text();
        document.getElementById("year").textContent = new Date().getFullYear();
        const cp = window.location.pathname.split("/").pop() || "index.html";
        document.querySelectorAll('.nav a').forEach(l => { if (l.getAttribute('href') === cp) l.classList.add('active'); });
      } catch (e) { console.error(e); }
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
