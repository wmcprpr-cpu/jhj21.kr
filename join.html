<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="theme-color" content="#0b1736" />
  <title>Join | 집현전21</title>
  <meta name="description" content="집현전21 참여 안내" />
  <link rel="icon" href="./logo.png" />
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="./script.js" defer></script>
</head>
<body>
  <div id="siteHeader"></div>

  <main>
    <section class="section">
      <div class="container">
        <div class="pagehead">
          <h1 class="h2">Join</h1>
          <p class="muted">연구·포럼·발간 활동에 참여하실 분을 환영합니다.</p>
        </div>

        <div class="grid" style="grid-template-columns:1fr 1fr; gap:14px">
          <div class="card">
            <h3 class="h3">정회원(예시)</h3>
            <p class="muted">연구/포럼 참여, 발간 기여, 운영/위원회 활동.</p>
          </div>
          <div class="card">
            <h3 class="h3">후원/협력(예시)</h3>
            <p class="muted">프로젝트 후원, 행사 협력, 연구/교육 파트너십.</p>
          </div>
        </div>

        <div style="height:14px"></div>

        <div class="callout">
          <h3 class="h3">참여 문의</h3>
          <p class="muted" style="margin:6px 0 0">참여 형태와 협력 방식을 안내해 드립니다.</p>
          <div style="margin-top:12px">
            <a class="btn btn--primary" href="./contact.html">문의하기</a>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>
  <button class="to-top" type="button" aria-label="맨 위로">↑</button>
</body>
</html>
