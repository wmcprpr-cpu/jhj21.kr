<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="theme-color" content="#0b1736" />
  <title>Forum | 집현전21</title>
  <meta name="description" content="집현전21 포럼" />
  <link rel="icon" href="./logo.png" />
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="./script.js" defer></script>
</head>
<body>
  <div id="siteHeader"></div>

  <main>
    <section class="section">
      <div class="container">
        <div class="pagehead">
          <h1 class="h2">Forum</h1>
          <p class="muted">포럼·라운드테이블로 전문 담론을 사회적 합의와 실행 과제로 전환합니다.</p>
        </div>

        <div class="grid" style="grid-template-columns:1fr 1fr; gap:14px">
          <div class="card">
            <h3 class="h3">정책포럼</h3>
            <p class="muted">주제 예시: “기후위기와 지역사회 회복탄력성”, “AI 시대 사회통합 모델”.</p>
          </div>
          <div class="card">
            <h3 class="h3">라운드테이블</h3>
            <p class="muted">핵심 의제 토론 → 요약본(Brief) 발간까지 연결합니다.</p>
          </div>
        </div>

        <div style="height:14px"></div>

        <div class="list">
          <div class="item">
            <div class="item__meta">FORUM</div>
            <div class="item__body">
              <h3>라운드테이블 01 (예정)</h3>
              <p>전문가 토론 → 논점 정리 → 합의안/권고안 도출.</p>
              <div class="item__tags"><span class="tag">Consensus</span><span class="tag">Summary</span></div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>
  <button class="to-top" type="button" aria-label="맨 위로">↑</button>
</body>
</html>
