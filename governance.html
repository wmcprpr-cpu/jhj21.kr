<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1736" />
  <title>Governance | 집현전21</title>
  <meta name="description" content="집현전21 거버넌스 및 조직도" />
  <link rel="icon" href="./logo.png" />
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="./script.js" defer></script>
</head>
<body>
  <div id="siteHeader"></div>

  <main>
    <section class="section">
      <div class="container">
        <div class="pagehead">
          <h1 class="h2">Governance</h1>
          <p class="muted">투명한 운영 구조와 전문위원회 체계를 통해 공공 신뢰도를 확보합니다.</p>
        </div>

        <div class="card">
          <h2 class="h3" style="margin-bottom:10px">조직도</h2>
          <p class="muted" style="margin-top:0">이사회·자문위원회·위원회·사무국의 역할이 한눈에 보이도록 구성했습니다.</p>

          <!-- 조직도 도표 (SVG) -->
          <div style="margin-top:14px; background:rgba(255,255,255,.7); border:1px solid var(--line); border-radius:22px; overflow:hidden">
            <svg viewBox="0 0 1200 720" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="집현전21 조직도">
              <defs>
                <style>
                  .box{fill:#fff;stroke:rgba(11,23,54,.18);stroke-width:2;rx:18}
                  .title{font:700 20px ui-sans-serif,system-ui; fill:rgba(11,23,54,.95)}
                  .sub{font:500 14px ui-sans-serif,system-ui; fill:rgba(15,23,42,.72)}
                  .tag{font:700 12px ui-sans-serif,system-ui; fill:rgba(11,23,54,.70); letter-spacing:.08em}
                  .gold{fill:rgba(186,159,101,.18);stroke:rgba(186,159,101,.45)}
                  .navy{fill:rgba(11,23,54,.06);stroke:rgba(11,23,54,.18)}
                  .line{stroke:rgba(11,23,54,.28);stroke-width:2}
                </style>
              </defs>

              <!-- Top -->
              <rect class="box gold" x="430" y="40" width="340" height="86" rx="18"/>
              <text class="tag" x="460" y="70">LEADERSHIP</text>
              <text class="title" x="460" y="98">명예회장 · 자문위원회 · 이사장</text>

              <!-- Second row -->
              <rect class="box navy" x="170" y="170" width="360" height="92" rx="18"/>
              <text class="tag" x="200" y="200">BOARD</text>
              <text class="title" x="200" y="228">이사회</text>
              <text class="sub" x="200" y="252">법인 운영 총괄 · 사업 승인 · 예산 심의</text>

              <rect class="box navy" x="670" y="170" width="360" height="92" rx="18"/>
              <text class="tag" x="700" y="200">ADVISORY</text>
              <text class="title" x="700" y="228">자문위원회 (Advisory Board)</text>
              <text class="sub" x="700" y="252">정책·연구 방향 자문 · 공공 신뢰도 확보</text>

              <!-- connectors -->
              <line class="line" x1="600" y1="126" x2="350" y2="170"/>
              <line class="line" x1="600" y1="126" x2="850" y2="170"/>

              <!-- Secretariat -->
              <rect class="box" x="430" y="300" width="340" height="92" rx="18"/>
              <text class="tag" x="460" y="330">SECRETARIAT</text>
              <text class="title" x="460" y="358">사무국</text>
              <text class="sub" x="460" y="382">실장 1명 · 행정 간사 2명</text>

              <line class="line" x1="350" y1="262" x2="600" y2="300"/>
              <line class="line" x1="850" y1="262" x2="600" y2="300"/>

              <!-- Committee grid -->
              <!-- left column -->
              <rect class="box" x="80" y="450" width="340" height="78" rx="18"/>
              <text class="title" x="110" y="490">사회통합·정책연구위원회</text>
              <text class="sub" x="110" y="514">사회갈등·양극화 · 재난복지 · 위기관리</text>

              <rect class="box" x="80" y="548" width="340" height="78" rx="18"/>
              <text class="title" x="110" y="588">학술연구·지식교류위원회</text>
              <text class="sub" x="110" y="612">세미나·포럼 · 학술지 · 연구자 네트워크</text>

              <rect class="box" x="80" y="646" width="340" height="78" rx="18"/>
              <text class="title" x="110" y="686">AI·디지털지식혁신위원회</text>
              <text class="sub" x="110" y="710">AI 기반 사회문제 해결 · 데이터 기반 모델</text>

              <!-- middle column -->
              <rect class="box" x="430" y="450" width="340" height="78" rx="18"/>
              <text class="title" x="460" y="490">문화예술보존·홍보위원회</text>
              <text class="sub" x="460" y="514">전통문화 콘텐츠 · 아카이빙 · 홍보</text>

              <rect class="box" x="430" y="548" width="340" height="78" rx="18"/>
              <text class="title" x="460" y="588">환경·기후정책연구위원회</text>
              <text class="sub" x="460" y="612">기후위기 대응 · 환경복지 · ESG</text>

              <rect class="box" x="430" y="646" width="340" height="78" rx="18"/>
              <text class="title" x="460" y="686">건강·웰빙연구위원회</text>
              <text class="sub" x="460" y="710">예방 중심 캠페인 · 정신건강 · 회복탄력성</text>

              <!-- right column -->
              <rect class="box" x="780" y="450" width="340" height="78" rx="18"/>
              <text class="title" x="810" y="490">가족·공동체회복위원회</text>
              <text class="sub" x="810" y="514">가족교육 · 세대통합 · 부모교육</text>

              <rect class="box" x="780" y="548" width="340" height="78" rx="18"/>
              <text class="title" x="810" y="588">복지실천·사회공헌위원회</text>
              <text class="sub" x="810" y="612">자원봉사 · 지역사회 연계 · 공공협력</text>

              <rect class="box" x="780" y="646" width="340" height="78" rx="18"/>
              <text class="title" x="810" y="686">국제협력 · 홍보/브랜드 · 재정/운영</text>
              <text class="sub" x="810" y="710">MOU·언론·브랜딩·예산·후원·성과평가</text>

              <!-- links from secretariat to columns -->
              <line class="line" x1="600" y1="392" x2="250" y2="450"/>
              <line class="line" x1="600" y1="392" x2="600" y2="450"/>
              <line class="line" x1="600" y1="392" x2="950" y2="450"/>
            </svg>
          </div>
        </div>

        <div class="grid grid--3" style="margin-top:14px">
          <div class="card">
            <h3 class="h3">이사회</h3>
            <p class="muted">법인 운영 총괄, 사업 승인 및 예산 심의를 담당합니다.</p>
          </div>
          <div class="card">
            <h3 class="h3">자문위원회</h3>
            <p class="muted">학계·법조·환경·문화·복지 전문가로 구성되어 정책·연구 방향을 자문합니다.</p>
          </div>
          <div class="card">
            <h3 class="h3">사무국</h3>
            <p class="muted">실장 1명, 행정 간사 2명 기반으로 운영·행정·대외협력 업무를 수행합니다.</p>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>
  <button class="to-top" type="button" aria-label="맨 위로">↑</button>
</body>
</html>
