<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    h1, h2, h3 { font-family: 'Noto Serif KR', serif; }
    .notice-list { border-top: 2px solid var(--navy); margin-top: 40px; }
    .notice-item { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 25px 15px; border-bottom: 1px solid var(--line);
      transition: background 0.2s;
    }
    .notice-item:hover { background: #fff; }
    .notice-info { display: flex; flex-direction: column; gap: 5px; }
    .notice-tag { 
      display: inline-block; width: fit-content; padding: 2px 10px; 
      font-size: 14px; font-weight: 700; background: var(--navy); color: white; 
      margin-bottom: 5px;
    }
    .notice-title { font-size: 20px; font-weight: 700; color: var(--navy); }
    .notice-date { font-size: 16px; color: var(--text-gray); }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="집현전21 로고" class="brand-logo">
        <span>집현전21</span>
      </a>
      <nav class="nav">
        <a href="about.html">소개</a>
        <a href="statutes.html">정관</a>
        <a href="fellows.html">연구위원</a>
        <a href="fields.html">연구분야</a>
        <a href="reports.html">보고서</a>
        <a href="notice.html" class="active">공지</a>
      </nav>
      <div class="cta">
        <a href="contact.html" class="btn btn-gold">협력 문의</a>
      </div>
    </div>
  </header>

  <section class="page-hero" style="background: var(--gold-pale); padding: 60px 0; text-align: center;">
    <div class="container">
      <h1 style="font-size: 42px; color: var(--navy); margin: 0;">알림마당</h1>
      <p style="color: var(--gold-dark); font-weight: 700; margin-top: 10px;">NOTICE & PRESS</p>
    </div>
  </section>

  <main class="container" style="padding: 80px 20px;">
    <h2 class="section-title" style="text-align: left;">새로운 소식</h2>
    
    <div class="notice-list">
      <div class="notice-item">
        <div class="notice-info">
          <span class="notice-tag">운영</span>
          <span class="notice-title">집현전21 공식 홈페이지 개설 및 정관 공개 안내</span>
          <span class="notice-date">2026.03.05</span>
        </div>
        <i class="fa-solid fa-chevron-right" style="color:var(--line)"></i>
      </div>

      <div class="notice-item">
        <div class="notice-info">
          <span class="notice-tag">연구</span>
          <span class="notice-title">2026년 상반기 정책 연구 과제 공모 안내</span>
          <span class="notice-date">2026.03.01</span>
        </div>
        <i class="fa-solid fa-chevron-right" style="color:var(--line)"></i>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <h2 style="font-family: 'Noto Serif KR', serif;">집현전21</h2>
      <p>지식의 깊이와 실천의 책임을 연결하는 공익·연구 공동체</p>
      <div style="margin: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px;">
        <p>문의: wmcprpr@gmail.com | 도메인: www.jhj21.kr</p>
        <p style="opacity: 0.5;">© 2026 Jiphyeonjeon21. All rights reserved.</p>
      </div>
    </div>
  </footer>

</body>
</html>
