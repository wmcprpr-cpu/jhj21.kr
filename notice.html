<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    h1, h2, h3 { font-family: 'Noto Serif KR', serif; }
    .notice-list { border-top: 2px solid var(--navy); margin-top: 40px; }
    .notice-item { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 25px 15px; border-bottom: 1px solid var(--line); transition: 0.2s;
    }
    .notice-item:hover { background: #fff; }
    .notice-tag { padding: 2px 10px; font-size: 14px; font-weight: 700; background: var(--navy); color: white; margin-bottom: 5px; display: inline-block; }
  </style>
</head>
<body>
  <header id="header-include"></header>

  <section class="page-hero" style="background: var(--gold-pale); padding: 60px 0; text-align: center;">
    <div class="container">
      <h1 style="font-size: 42px; color: var(--navy); margin: 0;">알림마당</h1>
      <p style="color: var(--gold-dark); font-weight: 700; margin-top: 10px;">NOTICE & PRESS</p>
    </div>
  </section>

  <main class="container" style="padding: 80px 20px;">
    <div class="notice-list">
      <div class="notice-item">
        <div class="notice-info">
          <span class="notice-tag">운영</span>
          <div style="font-size: 20px; font-weight: 700; color: var(--navy);">집현전21 공식 홈페이지 개설 및 정관 공개 안내</div>
          <div style="font-size: 16px; color: var(--text-gray); margin-top: 5px;">2026.03.05</div>
        </div>
      </div>
      <div class="notice-item">
        <div class="notice-info">
          <span class="notice-tag">연구</span>
          <div style="font-size: 20px; font-weight: 700; color: var(--navy);">2026년 상반기 정책 연구 과제 공모 안내</div>
          <div style="font-size: 16px; color: var(--text-gray); margin-top: 5px;">2026.03.01</div>
        </div>
      </div>
    </div>
  </main>

  <footer id="footer-include"></footer>

  <script>
    async function loadInclude() {
      try {
        const h = await fetch('assets/header.html');
        document.getElementById('header-include').innerHTML = await h.text();
        const f = await fetch('assets/footer.html');
        document.getElementById('footer-include').innerHTML = await f.text();
        document.getElementById("year").textContent = new Date().getFullYear();
        const cp = window.location.pathname.split("/").pop() || "index.html";
        document.querySelectorAll('.nav a').forEach(l => { if (l.getAttribute('href') === cp) l.classList.add('active'); });
      } catch (e) { console.error(e); }
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
