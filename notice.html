<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>공지사항 | 집현전21</title>

<link rel="stylesheet" href="assets/style.css">

<meta name="description" content="집현전21 공지사항">

</head>

<body>

<header id="header-include"></header>

<section class="hero">
<div class="container">

<h1>공지사항</h1>

<p>
집현전21의 활동, 연구발표, 세미나 일정 등을 안내합니다.
</p>

</div>
</section>

<section>

<div class="container">

<h2 class="section-title">최근 공지</h2>

<div class="grid">

<div class="card">
<h3>연구 세미나 개최 안내</h3>
<p>
집현전21 연구 세미나가 개최됩니다.
일시와 장소는 추후 공지됩니다.
</p>
</div>

<div class="card">
<h3>연구위원 모집</h3>
<p>
집현전21 연구 활동에 참여할 연구위원을 모집합니다.
</p>
</div>

<div class="card">
<h3>신규 연구 프로젝트</h3>
<p>
사회문제 해결을 위한 신규 연구 프로젝트가 시작되었습니다.
</p>
</div>

</div>

</div>

</section>

<footer id="footer-include"></footer>

<script>

async function loadInclude(){

try{

const headerRes=await fetch('assets/header.html')

if(headerRes.ok){

document.getElementById('header-include').innerHTML=await headerRes.text()

const current=(location.pathname.split('/').pop()||'index.html').toLowerCase()

document.querySelectorAll('.nav a').forEach(a=>{

if((a.getAttribute('href')||'').toLowerCase()===current) a.classList.add('active')

})

}

const footerRes=await fetch('assets/footer.html')

if(footerRes.ok){

document.getElementById('footer-include').innerHTML=await footerRes.text()

const y=document.getElementById('year')

if(y) y.textContent=new Date().getFullYear()

}

}catch(e){

console.error(e)

}

}

window.addEventListener('DOMContentLoaded',loadInclude)

</script>

</body>
</html>
