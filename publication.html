<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발간물 | 집현전21</title>

<link rel="stylesheet" href="assets/style.css">

<meta name="description" content="집현전21 발간물 및 연구자료">
</head>

<body>

<header id="header-include"></header>

<section class="hero">
<div class="container">

<h1>발간물</h1>

<p>
집현전21은 연구성과와 지식 공유를 위해 다양한 발간물을 제작합니다.
보고서, 정책 브리프, 학술자료 등을 통해 공공적 가치와 지식을 확산합니다.
</p>

</div>
</section>

<section>
<div class="container">

<h2 class="section-title">최근 발간물</h2>

<div class="grid">

<div class="card">
<h3>정책 연구 보고서</h3>
<p>
사회문제 해결을 위한 정책 분석과 실행 전략을 담은 연구 보고서입니다.
</p>
<a class="btn btn-gold" href="#">PDF 보기</a>
</div>

<div class="card">
<h3>문화 연구 브리프</h3>
<p>
문화예술 가치 보존 및 확산을 위한 연구자료와 분석 보고서입니다.
</p>
<a class="btn btn-gold" href="#">PDF 보기</a>
</div>

<div class="card">
<h3>사회 통합 연구</h3>
<p>
국민화합과 사회적 신뢰 회복을 위한 연구 프로젝트 자료입니다.
</p>
<a class="btn btn-gold" href="#">PDF 보기</a>
</div>

</div>

</div>
</section>

<footer id="footer-include"></footer>

<script>

async function loadInclude(){

try{

const headerRes = await fetch('assets/header.html')

if(headerRes.ok){

document.getElementById('header-include').innerHTML = await headerRes.text()

const current = (location.pathname.split('/').pop() || 'index.html').toLowerCase()

document.querySelectorAll('.nav a').forEach(a=>{

if((a.getAttribute('href')||'').toLowerCase()===current) a.classList.add('active')

})

}

const footerRes = await fetch('assets/footer.html')

if(footerRes.ok){

document.getElementById('footer-include').innerHTML = await footerRes.text()

const y=document.getElementById('year')

if(y) y.textContent=new Date().getFullYear()

}

}catch(e){

console.error(e)

}

}

window.addEventListener('DOMContentLoaded',loadInclude)

</script>

</body>
</html>
