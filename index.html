<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>집현전21 | 공익 연구 공동체</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>h1, h2, h3 { font-family: 'Noto Serif KR', serif; }</style>
</head>
<body>
  <header id="header-include"></header>
  <main>
    <section class="hero">
      <div class="container">
        <h1>과거의 지혜로 미래의 해법을 설계합니다</h1>
        <p>지난 역사의 위대한 현인들의 지성을 계승하는 공익 연구 공동체</p>
        <div style="margin-top: 40px;">
          <a href="reports.html" class="btn btn-gold">최신 연구보고서 보기</a>
          <a href="about.html" class="btn" style="margin-left:15px; background:transparent; border-color:white;">설립 취지 읽기</a>
        </div>
      </div>
    </section>
    <section>
      <div class="container">
        <h2 class="section-title">집현전21의 지향점</h2>
        <div class="grid">
          <div class="card"><h3>인류공영의 번영</h3><p>글로벌 현안을 연구하고 지속 가능한 발전을 위한 정책적 대안을 모색합니다.</p></div>
          <div class="card"><h3>국민화합과 국가부흥</h3><p>사회적 갈등의 구조적 해법을 제시하고 국가 전략을 연구합니다.</p></div>
          <div class="card"><h3>K-문화의 창의적 보존</h3><p>한국 문화의 고유한 가치를 학술적으로 정립하고 홍보합니다.</p></div>
        </div>
      </div>
    </section>
  </main>
  <footer id="footer-include"></footer>
  <script>
    async function loadInclude() {
      const h = await fetch('assets/header.html'); document.getElementById('header-include').innerHTML = await h.text();
      const f = await fetch('assets/footer.html'); document.getElementById('footer-include').innerHTML = await f.text();
      document.getElementById("year").textContent = new Date().getFullYear();
      const cp = window.location.pathname.split("/").pop() || "index.html";
      document.querySelectorAll('.nav a').forEach(l => { if (l.getAttribute('href') === cp) l.classList.add('active'); });
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
