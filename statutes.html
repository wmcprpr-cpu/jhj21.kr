<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>정관 | 집현전21</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: stretch; }
    .statute-card { background: #fff; border: 1px solid var(--line); padding: 35px; border-radius: 12px; }
  </style>
</head>
<body>
  <header id="header-include"></header>
  <main class="container" style="padding: 60px 0;">
    <h1 class="section-title">제2장 회원 및 임원</h1>
    <div class="grid-2">
      <div class="statute-card"><h3>회원 구분</h3><p>정회원, 일반회원, 후원회원으로 구성됩니다.</p></div>
      <div class="statute-card"><h3>임원 구성</h3><p>회장, 이사(5~10인), 감사를 둡니다.</p></div>
    </div>
  </main>
  <footer id="footer-include"></footer>
  <script>
    async function loadInclude() {
      const h = await fetch('assets/header.html'); document.getElementById('header-include').innerHTML = await h.text();
      const f = await fetch('assets/footer.html'); document.getElementById('footer-include').innerHTML = await f.text();
      document.getElementById("year").textContent = new Date().getFullYear();
    }
    window.onload = loadInclude;
  </script>
</body>
</html>
